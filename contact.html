<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/297131ce3c.js" crossorigin="anonymous"></script>
    <link rel="shortcut icon" href="./images/favicon.png" type="image/x-icon">
</head>

<body>

    <header>
        <div id="mainHeader">
            <div class="container">
                <div class="logo">
                    <img src="./images/logo 1 mayo.png" alt="" class="logoImg">
                    <i class="fa-solid fa-graduation-cap"></i>
                    <strong class="title">Primero de Mayo</strong>
                </div>
                <nav>
                    <div class="menu-toggle" onclick="toggleMenu()">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                    <ul id="menu">
                        <li><a href="./index.html">Inicio</a></li>
                        <li><a href="./teachers.html">Coordinador</a></li>
                        <li><a href="./profile.html">Perfil</a></li>
                        <li><a href="./contact.html" class="commonBtn">Contacto</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <section class="contactSection">
        <div class="contactContainer">
            <div class="contactInfo">
                <h2>Información de contacto</h2>
                <a href="https://www.google.com/maps/place/UNIDAD+EDUCATIVA+%22PRIMERO+DE+MAYO%22/@-3.8279506,-78.7594083,18z/data=!4m6!3m5!1s0x91cb7a061ab35707:0xca1e5c09a3e40afc!8m2!3d-3.8277557!4d-78.7594379!16s%2Fg%2F1hm3rn68t?entry=ttu&g_ep=EgoyMDI2MDQwOC4wIKXMDSoASAFQAw%3D%3D"
                    target="_blank">
                    <div class="infoItem">
                        <i class="fa-solid fa-location-dot"></i>
                        <p>C. Teniente Hugo Ortíz, Yantzaza, Ecuador</p>
                    </div>
                </a>
                <a href="mailto:correo@ejemplo.com">
                    <div class="infoItem">
                        <i class="fa-solid fa-envelope"></i>
                        <p>correo@ejemplo.com</p>
                    </div>
                </a>
                <a href="tel:+593991234567">
                    <div class="infoItem">
                        <i class="fa-solid fa-mobile-screen-button"></i>
                        <p>+593 99 123 4567</p>
                    </div>
                </a>
                <div class="socialIcons">
                    <i class="fa-brands fa-facebook-f"></i>
                    <i class="fa-brands fa-instagram"></i>
                    <i class="fa-brands fa-x-twitter"></i>
                </div>
            </div>
            <div class="contactForm">
                <h2>Escríbenos</h2>
                <form id="contactForm">
                    <div class="row">
                        <div class="inputBox">
                            <input type="text" name="nombre" placeholder=" " required>
                            <label>Nombre</label>
                        </div>
                        <div class="inputBox">
                            <input type="text" name="apellido" placeholder=" " required>
                            <label>Apellido</label>
                        </div>
                    </div>
                    <div class="row">
                        <div class="inputBox">
                            <input type="email" name="email" placeholder=" " required>
                            <label>Email</label>
                        </div>
                        <div class="inputBox">
                            <input type="text" name="celular" placeholder=" ">
                            <label>Celular</label>
                        </div>
                    </div>
                    <div class="inputBox full">
                        <textarea name="message" placeholder=" " required></textarea>
                        <label>Mensaje</label>
                    </div>
                    <!-- Opcional: evitar spam -->
                    <input type="hidden" name="_captcha" value="false">
                    <button type="submit">Enviar Mensaje</button>
                </form>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-bottom">
            <div class="footer-logo">
                <i class="fa-solid fa-location-dot"></i>
                <h4>Yantzaza</h4>
            </div>
            <div class="footer-links">
                <a href="./index.html">Inicio</a>
                <a href="./teachers.html">Coordinador</a>
                <a href="./profile.html">Perfil</a>
                <a href="./contact.html">Contacto</a>
            </div>
            <div class="social-icons">
                <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
            </div>
        </div>
        <div class="copyright">
            copyright @2026
            <a href="#">Primero de Mayo</a>
        </div>
    </footer>

    <script src="contact.js"></script>

</body>

</html>
