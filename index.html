<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primero de Mayo - Alimentos</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/297131ce3c.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <div id="mainHeader">
            <div class="container">
                <div class="logo">
                    <i class="fa-solid fa-graduation-cap"></i>
                    <strong class="title">Primero de Mayo</strong>
                </div>
                <nav>
                    <div class="menu-toggle" onclick="toggleMenu()">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                    <ul id="menu">
                        <li><a href="#">Inicio</a></li>
                        <li><a href="#">Cursos</a></li>
                        <li><a href="#">Profesores</a></li>
                        <li><a href="#">Noticias</a></li>
                        <li><a href="#" class="commonBtn">Boletín</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="hero-text">
            <h1 class="heading heroHeading">
                Conservación y <br> Procesamiento de Alimentos <br> <span></span>
            </h1>
            <p>
                Formación integral, infraestructura adecuada y una oferta académica diseñada para el desarrollo
            </p>

            <div class="stats">
                <button class="commonBtn">
                    Curso
                </button>
                <div>
                    <span id="courseCount">0</span>+<br>
                    <span class="counterText">Estudiantes</span>
                </div>
                <div>
                    <span id="studentCount">0</span>+<br>
                    <span class="counterText">Egresados</span>
                </div>
            </div>
        </div>

        <div class="hero-image">
            <img src="images/user.png" class="userImage">
            <img src="images/chart.png" class="heroIcon1">
            <img src="images/students.png" class="heroIcon2">
            <div class="circle-container">
                <div class="circle"></div>
                <div class="circle"></div>
                <div class="circle"></div>
            </div>
        </div>
    </section>

</body>
</html>
